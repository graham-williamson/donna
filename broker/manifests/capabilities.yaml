# Donna capability manifest.
#
# Spec: security-v1.1 §8. Broker refuses to start if any entry is
# malformed. Every medium/high capability MUST declare `revalidate`
# as either {handler, arguments} or {not_applicable: <reason>}.
#
# This file is LIVE CONFIG — changes require a broker restart (the
# broker loads it at startup and does not watch for changes).

capabilities:

  # ---- Gmail ------------------------------------------------------------

  - name: gmail.create_draft
    executor:
      type: mcp_tool
      tool: mcp__claude_ai_Gmail__create_draft
    param_schema:
      $ref: ./schemas/gmail_create_draft.json
    params_exact_match_required: true
    derived_fields_allowed: []
    risk_level: medium
    revalidate:
      not_applicable: stateless_write
    idempotency_date_from: created_utc
    approval_window_minutes: 1440
    execution_window_minutes: 720

  # gmail.send is HIGH-risk: always per-action approval UNLESS a matching
  # standing grant covers it (broker-standing-grants §8). A grant for
  # gmail.send MUST pin `to` — the validator rejects an unpinned recipient.
  - name: gmail.send
    executor:
      type: mcp_tool
      tool: mcp__claude_ai_Gmail__send_message
    param_schema:
      $ref: ./schemas/gmail_send.json
    params_exact_match_required: true
    derived_fields_allowed: []
    risk_level: high
    revalidate:
      not_applicable: stateless_write
    idempotency_date_from: created_utc
    approval_window_minutes: 1440
    execution_window_minutes: 720

  # ---- Google Calendar --------------------------------------------------

  - name: gcal.create_event
    executor:
      type: mcp_tool
      tool: mcp__claude_ai_Google_Calendar__create_event
    param_schema:
      $ref: ./schemas/gcal_create_event.json
    params_exact_match_required: true
    derived_fields_allowed: []
    risk_level: medium
    revalidate:
      not_applicable: idempotent_create
    idempotency_date_from: created_utc
    approval_window_minutes: 360
    execution_window_minutes: 60

  # ---- Notion -----------------------------------------------------------

  - name: notion.create_pages
    executor:
      type: mcp_tool
      tool: mcp__plugin_Notion_notion__notion-create-pages
    param_schema:
      $ref: ./schemas/notion_create_pages.json
    params_exact_match_required: true
    derived_fields_allowed: []
    risk_level: medium
    revalidate:
      not_applicable: idempotent_create
    idempotency_date_from: created_utc
    approval_window_minutes: 720
    execution_window_minutes: 120

  - name: notion.update_data_source
    executor:
      type: mcp_tool
      tool: mcp__plugin_Notion_notion__notion-update-data-source
    param_schema:
      $ref: ./schemas/notion_update_data_source.json
    params_exact_match_required: true
    derived_fields_allowed: []
    risk_level: medium
    revalidate:
      not_applicable: stateless_write
    idempotency_date_from: created_utc
    approval_window_minutes: 720
    execution_window_minutes: 120

  - name: notion.update_page
    executor:
      type: mcp_tool
      tool: mcp__plugin_Notion_notion__notion-update-page
    param_schema:
      $ref: ./schemas/notion_update_page.json
    params_exact_match_required: true
    derived_fields_allowed: []
    risk_level: medium
    revalidate:
      # Graham is the sole Notion editor in practice, so there is no
      # concurrent-writer race to re-check against. If collaborative
      # editing starts, upgrade this to a real revalidate handler.
      not_applicable: stateless_write
    idempotency_date_from: created_utc
    approval_window_minutes: 720
    execution_window_minutes: 120

  - name: notion.create_database
    executor:
      type: mcp_tool
      tool: mcp__plugin_Notion_notion__notion-create-database
    param_schema:
      $ref: ./schemas/notion_create_database.json
    params_exact_match_required: true
    derived_fields_allowed: []
    risk_level: medium
    revalidate:
      not_applicable: idempotent_create
    idempotency_date_from: created_utc
    approval_window_minutes: 720
    execution_window_minutes: 120

  - name: notion.create_view
    executor:
      type: mcp_tool
      tool: mcp__plugin_Notion_notion__notion-create-view
    param_schema:
      $ref: ./schemas/notion_create_view.json
    params_exact_match_required: true
    derived_fields_allowed: []
    risk_level: medium
    revalidate:
      not_applicable: idempotent_create
    idempotency_date_from: created_utc
    approval_window_minutes: 720
    execution_window_minutes: 120

  # ---- Everyone Active (Phase 2 — browser executor) ----------------------------

  # everyone_active.checkout is HIGH-risk and PER-PURCHASE-ONLY: real money
  # moves. Every run requires a fresh Telegram approval — policy.py's
  # NO_STANDING_GRANTS set makes it un-grantable (no approve-once autonomy).
  # Two price gates: the schema rejects max_price > 5000 pence at request
  # time, and the executor refuses to pay (over_cap) if the basket total
  # exceeds £50 or the approved max_price, regardless of approval.
  - name: everyone_active.checkout
    executor:
      type: subprocess
      binary: /Users/donna-broker/broker/executors/everyone_active_checkout
      timeout_seconds: 180
    creds:
      delivery: fd3
      entry: everyone_active
    param_schema:
      $ref: ./schemas/everyone_active_checkout.json
    params_exact_match_required: true
    derived_fields_allowed: []
    risk_level: high
    revalidate:
      not_applicable: no_external_state
    idempotency_date_from: params.date
    approval_window_minutes: 120
    execution_window_minutes: 60

  - name: everyone_active.book_class
    executor:
      type: subprocess
      binary: /Users/donna-broker/broker/executors/everyone_active_book
      timeout_seconds: 120
    creds:
      delivery: fd3
      entry: everyone_active
    param_schema:
      $ref: ./schemas/everyone_active_book.json
    params_exact_match_required: true
    derived_fields_allowed: []
    risk_level: medium
    revalidate:
      not_applicable: no_external_state
    idempotency_date_from: params.date
    approval_window_minutes: 120
    execution_window_minutes: 60
