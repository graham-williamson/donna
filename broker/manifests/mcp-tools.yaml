  # ---- Gamma ------------------------------------------------------------
  mcp__claude_ai_Gamma__read_gamma: low
  mcp__claude_ai_Gamma__get_folders: low
  mcp__claude_ai_Gamma__get_themes: low
  mcp__claude_ai_Gamma__get_generation_status: low
