  mcp__claude_ai_Sentry__get_issue_tag_values: low
  mcp__claude_ai_Sentry__get_profile_details: low
  mcp__claude_ai_Sentry__get_replay_details: low
  mcp__claude_ai_Sentry__get_sentry_resource: low
  mcp__claude_ai_Sentry__create_project: medium
  mcp__claude_ai_Sentry__create_dsn: medium
