# MCP-tool risk classification.
#
# Spec: security-v1.1 §8.1, §14.1 (Playwright is always blocked).
# Consumed by: broker.policy-check (via main.py) and by the rewired
# Phase 1 capability-guard.sh via `donna-broker policy-check`.
#
# Risks: low = allowed without approval. medium = block at hook, require
# broker request + approval. high = block at hook, require broker
# request + approval with stricter rate limits. blocked = never permitted.

tools:

  # ---- Gmail ------------------------------------------------------------
  mcp__claude_ai_Gmail__gmail_search_messages: low
  mcp__claude_ai_Gmail__get_thread: low
  mcp__claude_ai_Gmail__list_drafts: low
  mcp__claude_ai_Gmail__list_labels: low
  mcp__claude_ai_Gmail__search_threads: low
  mcp__claude_ai_Gmail__create_draft: medium
  # gmail.send is HIGH risk: always per-action approval at the hook unless
  # a matching broker standing grant covers it (broker-standing-grants §8).
  # Added by the standing-grants extension — no send tool was listed before.
  mcp__claude_ai_Gmail__send_message: high
  mcp__claude_ai_Gmail__create_label: medium
  mcp__claude_ai_Gmail__label_message: medium
  mcp__claude_ai_Gmail__label_thread: medium
  mcp__claude_ai_Gmail__unlabel_message: medium
  mcp__claude_ai_Gmail__unlabel_thread: medium

  # ---- Google Calendar --------------------------------------------------
  mcp__claude_ai_Google_Calendar__list_calendars: low
  mcp__claude_ai_Google_Calendar__list_events: low
  mcp__claude_ai_Google_Calendar__get_event: low
  mcp__claude_ai_Google_Calendar__suggest_time: low
  mcp__claude_ai_Google_Calendar__create_event: medium
  mcp__claude_ai_Google_Calendar__update_event: medium
  mcp__claude_ai_Google_Calendar__delete_event: medium
  mcp__claude_ai_Google_Calendar__respond_to_event: medium

  # ---- Notion -----------------------------------------------------------
  mcp__plugin_Notion_notion__notion-fetch: low
  mcp__plugin_Notion_notion__notion-search: low
  mcp__plugin_Notion_notion__notion-get-users: low
  mcp__plugin_Notion_notion__notion-get-teams: low
  mcp__plugin_Notion_notion__notion-get-comments: low
  mcp__plugin_Notion_notion__notion-create-pages: medium
  mcp__plugin_Notion_notion__notion-create-database: medium
  mcp__plugin_Notion_notion__notion-create-comment: medium
  mcp__plugin_Notion_notion__notion-duplicate-page: medium
  mcp__plugin_Notion_notion__notion-move-pages: medium
  mcp__plugin_Notion_notion__notion-update-page: medium
  mcp__plugin_Notion_notion__notion-update-data-source: medium
  mcp__plugin_Notion_notion__notion-update-view: medium
  mcp__plugin_Notion_notion__notion-create-view: medium

  # ---- Telegram (low-risk send — Graham↔Donna) --------------------------
  mcp__plugin_telegram_telegram__reply: low
  mcp__plugin_telegram_telegram__react: low
  mcp__plugin_telegram_telegram__edit_message: low
  mcp__plugin_telegram_telegram__get_history: low
  mcp__plugin_telegram_telegram__search_messages: low

  # ---- Sentry -----------------------------------------------------------
  mcp__claude_ai_Sentry__whoami: low
  mcp__claude_ai_Sentry__analyze_issue_with_seer: low
  mcp__claude_ai_Sentry__get_doc: low
  mcp__claude_ai_Sentry__search_docs: low
  mcp__claude_ai_Sentry__search_events: low
  mcp__claude_ai_Sentry__search_issues: low
  mcp__claude_ai_Sentry__search_issue_events: low
  mcp__claude_ai_Sentry__find_organizations: low
  mcp__claude_ai_Sentry__find_projects: low
  mcp__claude_ai_Sentry__find_teams: low
  mcp__claude_ai_Sentry__find_releases: low
  mcp__claude_ai_Sentry__find_dsns: low
